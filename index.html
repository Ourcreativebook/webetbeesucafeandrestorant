<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Webet Beersu Cafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fef8ed; padding: 20px; }
        .header { background: #1e3c2c; color: white; padding: 30px; border-radius: 20px; text-align: center; }
        .menu-item { background: white; margin: 10px 0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .price { color: #c17b4c; font-weight: bold; }
        button { background: #1e3c2c; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .cart { background: white; margin-top: 20px; padding: 20px; border-radius: 20px; max-width: 600px; margin: 20px auto; }
        .total { font-size: 1.3rem; font-weight: bold; margin: 15px 0; }
        .copy-btn { background: #e0d6c8; color: #1e3c2c; padding: 4px 12px; border-radius: 20px; border: none; cursor: pointer; }
        footer { text-align: center; margin-top: 30px; color: #5a4a3a; }
        @media (max-width: 600px) { .menu-item { flex-direction: column; gap: 10px; text-align: center; } }
    </style>
</head>
<body>

<div class="header">
    <h1>WEBET BEERSU CAFE</h1>
    <p>Addis Ababa | Call 0911718700</p>
</div>

<div id="menuList" style="max-width:600px; margin:20px auto;"></div>

<div class="cart">
    <h3>Your Order</h3>
    <div id="cartItems">No items yet</div>
    <div class="total" id="totalPrice">Total: 0 ETB</div>
    <button id="orderBtn">Place Order</button>
</div>

<div class="cart">
    <h3>Payment</h3>
    <p><strong>CBE:</strong> 1000234567890 <button class="copy-btn" data-copy="1000234567890">Copy</button></p>
    <p><strong>TeleBirr:</strong> 0911718700 <button class="copy-btn" data-copy="0911718700">Copy</button></p>
</div>

<footer>
    <p>© Webet Beersu Cafe | Fast Delivery & Pickup</p>
</footer>

<script>
    const MENU = [
        { id: 1, name: "Beyaynetu (Mixed Veg)", price: 300 },
        { id: 2, name: "Yebeg Tibs (Lamb)", price: 600 },
        { id: 3, name: "Gomen Bisega", price: 350 },
        { id: 4, name: "Special Pizza", price: 850 },
        { id: 5, name: "Cheese Burger", price: 470 },
        { id: 6, name: "Mango Juice", price: 150 }
    ];

    let cart = [];

    function save() { localStorage.setItem("cafe_cart", JSON.stringify(cart)); }
    function load() { let saved = localStorage.getItem("cafe_cart"); if (saved) cart = JSON.parse(saved); }

    function add(id) {
        let item = MENU.find(i => i.id === id);
        let existing = cart.find(i => i.id === id);
        if (existing) existing.qty = (existing.qty || 1) + 1;
        else cart.push({ ...item, qty: 1 });
        save();
        render();
    }

    function remove(id) {
        cart = cart.filter(i => i.id !== id);
        save();
        render();
    }

    function update(id, delta) {
        let item = cart.find(i => i.id === id);
        if (item) {
            item.qty = (item.qty || 1) + delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            save();
            render();
        }
    }

    function total() {
        return cart.reduce((sum, i) => sum + (i.price * (i.qty || 1)), 0);
    }

    function render() {
        let menuHtml = `<h2>Menu</h2>`;
        MENU.forEach(item => {
            menuHtml += `
                <div class="menu-item">
                    <span><strong>${item.name}</strong></span>
                    <span class="price">${item.price} ETB</span>
                    <button onclick="add(${item.id})">+ Add</button>
                </div>
            `;
        });
        document.getElementById('menuList').innerHTML = menuHtml;

        let cartHtml = "";
        if (cart.length === 0) {
            cartHtml = "No items yet";
        } else {
            cart.forEach(item => {
                let qty = item.qty || 1;
                cartHtml += `
                    <div class="menu-item" style="margin-bottom:10px;">
                        <span><strong>${item.name}</strong> x${qty}</span>
                        <span>${item.price * qty} ETB</span>
                        <div>
                            <button onclick="update(${item.id}, -1)">-</button>
                            <button onclick="update(${item.id}, 1)">+</button>
                            <button onclick="remove(${item.id})" style="background:#c17b4c;">Remove</button>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('cartItems').innerHTML = cartHtml;
        document.getElementById('totalPrice').innerText = `Total: ${total()} ETB`;
    }

    document.getElementById('orderBtn').onclick = () => {
        let name = prompt("Your name:");
        if (!name) return;
        if (cart.length === 0) { alert("Cart is empty."); return; }
        alert(`${name}, total: ${total()} ETB\nPay via TeleBirr 0911718700 or CBE 1000234567890`);
        cart = [];
        save();
        render();
    };

    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.onclick = () => {
            navigator.clipboard.writeText(btn.getAttribute('data-copy'));
            alert("Copied!");
        };
    });

    load();
    render();
</script>
</body>
</html>
