<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Webet Beersu Cafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #fef8ed; margin: 0; padding: 20px; }
        .header { background: #1e3c2c; color: white; padding: 30px; border-radius: 20px; text-align: center; }
        .menu { max-width: 600px; margin: 20px auto; }
        .item { background: white; margin: 10px 0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .price { color: #c17b4c; font-weight: bold; }
        button { background: #1e3c2c; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .cart { background: white; margin-top: 30px; padding: 20px; border-radius: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .total { font-size: 1.3rem; font-weight: bold; margin: 15px 0; }
        .copy-btn { background: #e0d6c8; color: #1e3c2c; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        footer { text-align: center; margin-top: 40px; color: #5a4a3a; }
        @media (max-width: 500px) { .item { flex-direction: column; gap: 10px; text-align: center; } }
    </style>
</head>
<body>

<div class="header">
    <h1>🍽️ WEBET BEERSU CAFE</h1>
    <p>Addis Ababa | Traditional Coffee & Ethiopian Food</p>
    <p>📞 0911718700</p>
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cartSection">
    <h3>🛒 Your Order</h3>
    <div id="cartItems">No items yet</div>
    <div class="total" id="totalPrice">Total: 0 ETB</div>
    <button id="placeOrderBtn">✅ Place Order</button>
</div>

<div class="cart" style="margin-top: 15px;">
    <h3>💳 Payment</h3>
    <p><strong>CBE:</strong> 1000234567890 (Webet Beersu Cafe) <button class="copy-btn" data-copy="1000234567890">Copy</button></p>
    <p><strong>TeleBirr:</strong> 0911718700 <button class="copy-btn" data-copy="0911718700">Copy</button></p>
</div>

<footer>
    <p>© 2025 Webet Beersu Cafe | Fast Delivery & Pickup</p>
</footer>

<script>
    const MENU = [
        { id: 1, name: "በየአይነት / Beyaynetu", price: 300 },
        { id: 2, name: "የበግ ትብስ / Yebeg Tibs", price: 600 },
        { id: 3, name: "ጎመን በስጋ / Gomen Bisega", price: 350 },
        { id: 4, name: "Special Pizza", price: 850 },
        { id: 5, name: "Cheese Burger", price: 470 },
        { id: 6, name: "Mango Juice", price: 150 }
    ];

    let cart = [];

    function saveCart() { localStorage.setItem("webet_cart", JSON.stringify(cart)); }
    function loadCart() { let saved = localStorage.getItem("webet_cart"); if (saved) cart = JSON.parse(saved); }

    function addToCart(id) {
        let item = MENU.find(i => i.id === id);
        let existing = cart.find(i => i.id === id);
        if (existing) existing.qty += 1;
        else cart.push({ ...item, qty: 1 });
        saveCart();
        renderAll();
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderAll();
    }

    function updateQty(id, delta) {
        let item = cart.find(i => i.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            saveCart();
            renderAll();
        }
    }

    function totalPrice() {
        return cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    }

    function renderMenu() {
        let html = `<h2>📋 Our Menu</h2>`;
        MENU.forEach(item => {
            html += `
                <div class="item">
                    <span><strong>${item.name}</strong></span>
                    <span class="price">${item.price} ETB</span>
                    <button onclick="addToCart(${item.id})">+ Add</button>
                </div>
            `;
        });
        document.getElementById('menu').innerHTML = html;
    }

    function renderCart() {
        let container = document.getElementById('cartItems');
        if (cart.length === 0) {
            container.innerHTML = "No items yet — add from menu";
            document.getElementById('totalPrice').innerText = "Total: 0 ETB";
            return;
        }
        let html = "";
        cart.forEach(item => {
            html += `
                <div class="item" style="margin-bottom: 10px;">
                    <span><strong>${item.name}</strong> x${item.qty}</span>
                    <span>${item.price * item.qty} ETB</span>
                    <div>
                        <button onclick="updateQty(${item.id}, -1)" style="background:#ccc; color:black; padding:4px 12px;">-</button>
                        <button onclick="updateQty(${item.id}, 1)" style="padding:4px 12px;">+</button>
                        <button onclick="removeItem(${item.id})" style="background:#c17b4c;">Remove</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        document.getElementById('totalPrice').innerText = `Total: ${totalPrice()} ETB`;
    }

    function renderAll() {
        renderMenu();
        renderCart();
    }

    document.getElementById('placeOrderBtn').onclick = function() {
        let name = prompt("Enter your name:");
        if (!name) return;
        if (cart.length === 0) { alert("Cart is empty."); return; }
        alert(`Thank you ${name}!\nTotal: ${totalPrice()} ETB\nPay via TeleBirr: 0911718700 or CBE: 1000234567890\nWe will contact you.`);
        cart = [];
        saveCart();
        renderAll();
    };

    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(btn.getAttribute('data-copy'));
            alert("Copied!");
        });
    });

    loadCart();
    renderAll();
</script>
</body>
</html>
